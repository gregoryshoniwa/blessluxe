name: Deploy to droplet

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    name: Pull + rebuild on droplet
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Sanity check — secrets present
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}" && echo "DEPLOY_HOST ✓"  || (echo "DEPLOY_HOST missing"  && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" && echo "DEPLOY_USER ✓"  || (echo "DEPLOY_USER missing"  && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" && echo "DEPLOY_SSH_KEY ✓" || (echo "DEPLOY_SSH_KEY missing" && exit 1)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     22
          timeout:  60s
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/blessluxe
            echo "═══ pulling master ═══"
            git fetch --quiet origin master
            git reset --hard origin/master
            git log -1 --pretty='format:%h %s'
            echo
            echo "═══ ensuring postgres is up ═══"
            docker compose up -d postgres
            for i in $(seq 1 30); do
              docker compose exec -T postgres pg_isready -U blessluxe > /dev/null 2>&1 && break
              sleep 2
            done
            echo "═══ running schema migration ═══"
            docker compose run --rm shop \
              node --experimental-strip-types --experimental-transform-types \
              src/db/migrate.ts
            echo "═══ rebuilding images ═══"
            docker compose build
            echo "═══ recreating containers ═══"
            docker compose up -d --remove-orphans
            echo "═══ pruning old images (>72h) ═══"
            docker image prune -af --filter 'until=72h' > /dev/null 2>&1 || true
            echo "═══ deploy ${{ github.sha }} complete ═══"

      - name: Health check via Caddy
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 5
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' https://api.blessluxe.com/health || echo 000)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✓ API responding at the new commit"
              exit 0
            fi
          done
          echo "✗ Health check never returned 200"
          exit 1

      - name: Surface shop logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/blessluxe
            echo "═══ shop logs (tail 80) ═══"
            docker compose logs shop --tail 80
            echo
            echo "═══ container status ═══"
            docker compose ps
