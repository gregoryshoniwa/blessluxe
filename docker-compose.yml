## ─────────────────────────────────────────────────────────
##  BLESSLUXE — Full-Stack Docker Compose
##
##  Usage:
##    cp .env.docker .env          # one-time setup
##    docker compose up --build    # build & start everything
##
##  Optional after first start (creates default admin + sample data):
##    docker compose exec shop node --experimental-strip-types --experimental-transform-types src/db/seed.ts
## ─────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL with pgvector ────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blessluxe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blessluxe}
      POSTGRES_DB: ${POSTGRES_DB:-blessluxe}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blessluxe}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── BLESSLUXE Shop Backend (port 9001) ─────────────────
  shop:
    build:
      context: .
      dockerfile: backend/shop/Dockerfile
    restart: unless-stopped
    ports:
      - "9001:9001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-blessluxe}:${POSTGRES_PASSWORD:-blessluxe}@postgres:5432/${POSTGRES_DB:-blessluxe}?sslmode=disable
      PORT: 9001
      STORE_CORS: ${STORE_CORS:-http://localhost:3000},http://storefront:3000
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:3001}
      PUBLISHABLE_API_KEY: ${SHOP_PUBLISHABLE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-blessluxe-shop-secret-change-me}
      UPLOAD_DIR: /app/backend/shop/uploads
      # AI generation (Nano Banana images + Veo 3 video)
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      GOOGLE_NANO_BANANA_MODEL: ${GOOGLE_NANO_BANANA_MODEL:-}
      GOOGLE_VEO_MODEL: ${GOOGLE_VEO_MODEL:-}
    volumes:
      - shop_uploads:/app/backend/shop/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Next.js Storefront (port 3000) ─────────────────────
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_COMMERCE_BACKEND: ${NEXT_PUBLIC_COMMERCE_BACKEND:-http://localhost:9001}
        NEXT_PUBLIC_GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      shop:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_COMMERCE_BACKEND: ${NEXT_PUBLIC_COMMERCE_BACKEND:-http://localhost:9001}
      # Server-side (RSC, /api routes) talks to the shop service over the
      # compose network — "localhost" inside this container is the storefront,
      # not the shop. The browser keeps using NEXT_PUBLIC_COMMERCE_BACKEND.
      SHOP_BACKEND_INTERNAL_URL: ${SHOP_BACKEND_INTERNAL_URL:-http://shop:9001}
      NEXT_PUBLIC_GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      AI_DATABASE_URL: postgres://${POSTGRES_USER:-blessluxe}:${POSTGRES_PASSWORD:-blessluxe}@postgres:5432/${POSTGRES_DB:-blessluxe}?sslmode=disable
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-to-a-random-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ADMIN_DASHBOARD_KEY: ${ADMIN_DASHBOARD_KEY:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-affiliate-media}
      GOOGLE_NANO_BANANA_MODEL: ${GOOGLE_NANO_BANANA_MODEL:-gemini-3.1-flash-image-preview}
      # Transactional email (Nodemailer / SendGrid)
      STOREFRONT_EMAIL_PROVIDER: ${STOREFRONT_EMAIL_PROVIDER:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM: ${SENDGRID_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-}
      REPLY_TO_EMAIL: ${REPLY_TO_EMAIL:-}

  # ─── Next.js Admin Dashboard (port 3001) ────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_SHOP_BACKEND: ${NEXT_PUBLIC_SHOP_BACKEND:-http://localhost:9001}
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      shop:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_SHOP_BACKEND: ${NEXT_PUBLIC_SHOP_BACKEND:-http://localhost:9001}

volumes:
  postgres_data:
  shop_uploads:
